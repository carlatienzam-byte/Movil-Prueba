<!Doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@5.x.x/dist/aframe-event-set-component.min.js"></script>

  <!-- ══ COMPONENTES A-FRAME — DEBEN IR ANTES DE <a-scene> ══ -->
  <script>
    /* Variables del joystick accesibles desde el componente */
    var JOY_R    = 37;
    var SPEED    = 0.055;
    var joyActive = false;
    var joyDx = 0, joyDy = 0;

    /* Movimiento — se registra aquí para que A-Frame lo encuentre al parsear el HTML */
    AFRAME.registerComponent('mobile-movement', {
      tick: function () {
        if (!joyActive) return;
        var nx = joyDx / JOY_R;
        var ny = joyDy / JOY_R;
        if (Math.abs(nx) < 0.05 && Math.abs(ny) < 0.05) return;

        var camEl = this.el.querySelector('[camera]');
        if (!camEl) return;

        /* Ángulo Y de la cámara en world space */
        var euler = new THREE.Euler();
        euler.setFromQuaternion(camEl.object3D.getWorldQuaternion(new THREE.Quaternion()), 'YXZ');
        var angle = euler.y;

        /* Vectores de movimiento calculados desde el ángulo, sin producto vectorial */
        /* Joystick arriba (ny<0) → avanzar; joystick derecha (nx>0) → ir a la derecha */
        var sinA = Math.sin(angle);
        var cosA = Math.cos(angle);

        var pos = this.el.object3D.position;
        /* adelante/atrás */
        pos.x += sinA * (-ny) * SPEED;
        pos.z += cosA * (-ny) * SPEED;
        /* derecha/izquierda */
        pos.x += cosA * nx * SPEED;
        pos.z += (-sinA) * nx * SPEED;
      }
    });
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow: hidden; }

    #joy-zone {
      position: fixed; bottom: 28px; left: 20px;
      width: 120px; height: 120px;
      z-index: 9999; touch-action: none;
    }
    .joy-base {
      width: 120px; height: 120px; border-radius: 50%;
      background: rgba(255,255,255,0.13);
      border: 2px solid rgba(255,255,255,0.4);
      position: relative;
    }
    .joy-thumb {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.55);
      border: 2px solid rgba(255,255,255,0.9);
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none;
    }
    #btn-portal {
      position: fixed; bottom: 28px; right: 20px;
      width: 76px; height: 76px; border-radius: 50%;
      background: rgba(178,143,80,0.25);
      border: 2px solid rgba(178,143,80,0.9);
      color: #fff; font-family: sans-serif;
      font-size: 11px; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      text-align: center; line-height: 1.3;
      z-index: 9999; touch-action: manipulation; user-select: none;
    }
    #btn-portal:active { background: rgba(178,143,80,0.55); }

    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      pointer-events: none; z-index: 9998;
    }
    #debug {
      position: fixed; top: 10px; right: 10px;
      background: rgba(0,0,0,0.6); color: #0f0;
      font-family: monospace; font-size: 13px;
      padding: 8px 12px; border-radius: 8px;
      z-index: 9999; pointer-events: none;
      line-height: 1.6;
    }
      position: fixed; bottom: 160px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: #fff;
      font-family: sans-serif; font-size: 14px;
      padding: 8px 18px; border-radius: 20px;
      z-index: 9999; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- JOYSTICK -->
  <div id="joy-zone">
    <div class="joy-base" id="joy-base">
      <div class="joy-thumb" id="joy-thumb"></div>
    </div>
  </div>

  <!-- BOTÓN PORTAL -->
  <div id="btn-portal">ENTRAR<br>PORTAL</div>

  <!-- CROSSHAIR -->
  <div id="crosshair">
    <svg width="34" height="34" viewBox="0 0 34 34">
      <circle cx="17" cy="17" r="13" fill="none" stroke="white" stroke-width="1.5" opacity="0.75"/>
      <line x1="17" y1="4"  x2="17" y2="11" stroke="white" stroke-width="1.5" opacity="0.75"/>
      <line x1="17" y1="23" x2="17" y2="30" stroke="white" stroke-width="1.5" opacity="0.75"/>
      <line x1="4"  y1="17" x2="11" y2="17" stroke="white" stroke-width="1.5" opacity="0.75"/>
      <line x1="23" y1="17" x2="30" y2="17" stroke="white" stroke-width="1.5" opacity="0.75"/>
      <circle cx="17" cy="17" r="2" fill="white" opacity="0.9"/>
    </svg>
  </div>

  <!-- DEBUG -->
  <div id="debug">nx: 0.00<br>ny: 0.00</div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- ══════════ ESCENA A-FRAME ══════════ -->
  <a-scene vr-mode-ui="enabled: true">

    <a-gltf-model src="backrooms_vr.glb" scale="1.25 1.25 1.25" position="0 0 0"></a-gltf-model>

    <a-plane material="color: #ba9652" rotation="-90 0 0"
             geometry="height: 1000; width: 1000" position="0 -4.344 0"></a-plane>

    <a-sky material="color: #b28f50"></a-sky>

    <a-sound src="warm-nights.mp3" autoplay="true"
             position="-38.38629 7.52826 6.26842"
             sound="loop: true; volume: 20"></a-sound>

    <!-- PORTALES -->
    <a-link id="miEnlace1"
            href="https://carlatienzam-byte.github.io/EPE-Alberto_Santin-Vera/"
            title="Sala Gasolinera"
            position="6.4927 0.94772 6.76992" scale="0.5 0.5 0.5"
            geometry="primitive: circle; segments: 64"
            material="shader: portal; side: double; previewDistance: 7.5"
            rotation="-2.175670862578057 -84.75516088305645 0"
            class="portal" data-url="https://carlatienzam-byte.github.io/EPE-Alberto_Santin-Vera/">
      <a-entity text="align: center; color: white; font: kelsonsans; value: Sala Gasolinera; width: 5"
                position="0 1.5 0" rotation="0 180 0"></a-entity>
    </a-link>

    <a-link id="miEnlace2"
            href="https://carlatienzam-byte.github.io/EPE-Carmen-Lara-Gomez/"
            title="Sala Japanese Period"
            position="-42.05693 1.3171 -4.44459" scale="0.5 0.5 0.5"
            geometry="primitive: circle; segments: 64"
            material="shader: portal; side: double; previewDistance: 7.5"
            rotation="0 -176.79999999999998 0"
            class="portal" data-url="https://carlatienzam-byte.github.io/EPE-Carmen-Lara-Gomez/">
      <a-entity text="align: center; color: white; font: kelsonsans; value: Sala Japanese Period; width: 5"
                position="0 1.5 0" rotation="0 180 0"></a-entity>
    </a-link>

    <a-link id="miEnlace3"
            href="https://carlatienzam-byte.github.io/EPE-Alejandra-Henche-de-Lucas/"
            title="Strange World"
            position="-54.32779 1.14831 8.06231" scale="0.5 0.5 0.5"
            geometry="primitive: circle; segments: 64"
            material="shader: portal; side: double; previewDistance: 7.5"
            rotation="-1.7723184711696804 5 0"
            class="portal" data-url="https://carlatienzam-byte.github.io/EPE-Alejandra-Henche-de-Lucas/">
      <a-entity text="align: center; color: white; font: kelsonsans; value: Strange World; width: 5"
                position="0 1.5 0" rotation="0 180 0"></a-entity>
    </a-link>

    <a-link id="miEnlace4"
            href="https://carlatienzam-byte.github.io/EPE-Laura-Sofia-Aguirre/"
            title="The Simpsons"
            position="-53.73499 1.76586 -4.54693" scale="0.5 0.5 0.5"
            geometry="primitive: circle; segments: 64"
            material="shader: portal; side: double; previewDistance: 7.5"
            rotation="0 179.9 0"
            class="portal" data-url="https://carlatienzam-byte.github.io/EPE-Laura-Sofia-Aguirre/">
      <a-entity text="align: center; color: white; font: kelsonsans; value: The Simpsons; width: 5"
                position="0 1.5 0" rotation="0 180 0"></a-entity>
    </a-link>

    <a-link id="miEnlace5"
            href="https://carlatienzam-byte.github.io/EPE-Pilar-Montalvo-Velasco/"
            title="Adventure Time"
            position="-79.05526 1.66112 18.02414" scale="0.5 0.5 0.5"
            geometry="primitive: circle; segments: 64"
            material="shader: portal; side: double; previewDistance: 7.5"
            rotation="0 360 0"
            class="portal" data-url="https://carlatienzam-byte.github.io/EPE-Pilar-Montalvo-Velasco/">
      <a-entity text="align: center; color: white; font: kelsonsans; value: Adventure Time; width: 5"
                position="0 1.5 0" rotation="0 180 0"></a-entity>
    </a-link>

    <!--
      CÁMARA:
      - El rig NO tiene altura (y=0)
      - a-camera tiene userHeight:0 para no añadir los 1.6m automáticos
      - position="0 1.6 0" en la propia cámara fija la altura manualmente
      - mobile-movement en el rig, registrado ANTES del <a-scene>
    -->
    <a-entity id="rig" position="0 0 0" mobile-movement>
      <a-camera id="camera"
                position="0 1.6 0"
                camera="userHeight: 0"
                look-controls="touchEnabled: true; magicWindowTrackingEnabled: false; pointerLockEnabled: false"
                wasd-controls="enabled: false">
        <a-cursor color="#b28f50" fuse="false" raycaster="objects: .portal"></a-cursor>
      </a-camera>
    </a-entity>

  </a-scene>

  <script>
    /* ── JOYSTICK ── */
    var joyBase  = document.getElementById('joy-base');
    var joyThumb = document.getElementById('joy-thumb');

    function joyPos(touch) {
      var r = joyBase.getBoundingClientRect();
      return {
        x: touch.clientX - r.left - r.width  / 2,
        y: touch.clientY - r.top  - r.height / 2
      };
    }

    joyBase.addEventListener('touchstart', function(e) {
      e.preventDefault(); joyActive = true;
    }, { passive: false });

    joyBase.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (!joyActive) return;
      var p = joyPos(e.touches[0]);
      var d = Math.sqrt(p.x*p.x + p.y*p.y);
      var c = d > JOY_R ? JOY_R / d : 1;
      joyDx =  p.x * c;
      joyDy = -p.y * c;
      document.getElementById('debug').innerHTML =
        'nx: '+(joyDx/JOY_R).toFixed(2)+'<br>ny: '+(joyDy/JOY_R).toFixed(2);
      joyThumb.style.transform =
        'translate(calc(-50% + '+joyDx+'px), calc(-50% + '+joyDy+'px))';
    }, { passive: false });

    joyBase.addEventListener('touchend', function(e) {
      e.preventDefault();
      joyActive = false; joyDx = 0; joyDy = 0;
      joyThumb.style.transform = 'translate(-50%,-50%)';
    }, { passive: false });

    /* ── TOAST ── */
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(t._tid);
      t._tid = setTimeout(function(){ t.classList.remove('show'); }, 2500);
    }

    /* ── PORTAL por raycaster central ── */
    function getPortalAtCenter() {
      var camEl = document.getElementById('camera');
      if (!camEl) return null;
      var cam = camEl.getObject3D('camera');
      if (!cam) return null;

      var rc = new THREE.Raycaster();
      rc.setFromCamera(new THREE.Vector2(0,0), cam);

      var meshes = [];
      document.querySelectorAll('.portal').forEach(function(el) {
        el.object3D.traverse(function(o){ if (o.isMesh) meshes.push(o); });
      });

      var hits = rc.intersectObjects(meshes, true);
      if (!hits.length) return null;

      var obj = hits[0].object;
      for (var i = 0; i < 8; i++) {
        if (obj.el && obj.el.dataset && obj.el.dataset.url) return obj.el;
        if (!obj.parent) break;
        obj = obj.parent;
      }
      return null;
    }

    function activatePortal(el) {
      if (!el) { showToast('Apunta a un portal'); return; }
      showToast('Entrando: ' + (el.getAttribute('title') || 'Portal'));
      setTimeout(function(){ window.location.href = el.dataset.url; }, 600);
    }

    /* ── BOTÓN ── */
    var btnPortal = document.getElementById('btn-portal');
    btnPortal.addEventListener('touchstart', function(e) {
      e.preventDefault(); activatePortal(getPortalAtCenter());
    }, { passive: false });
    btnPortal.addEventListener('click', function() {
      activatePortal(getPortalAtCenter());
    });

    /* ── DESBLOQUEO DE AUDIO EN MÓVIL ──
       Los navegadores móviles bloquean el audio hasta el primer toque.
       En cuanto el usuario interactúa, reanudamos el AudioContext y
       forzamos el play del sonido de A-Frame. */
    var audioUnlocked = false;
    function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;

      var ctx = THREE.AudioContext ? THREE.AudioContext.getContext() : null;
      if (ctx && ctx.state === 'suspended') ctx.resume();

      var soundEl = document.querySelector('a-sound');
      if (soundEl) {
        var soundComp = soundEl.components && soundEl.components.sound;
        if (soundComp) soundComp.playSound();
      }
    }

    document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });
    document.addEventListener('click',      unlockAudio, { once: true });

    /* ── CLICK EN PORTALES (desktop) ── */
    ['miEnlace1','miEnlace2','miEnlace3','miEnlace4','miEnlace5'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('click', function() {
        window.location.href = el.dataset.url;
      });
    });
  </script>

</body>
</html>
